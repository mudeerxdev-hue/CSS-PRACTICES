<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LINKS IN CSS</title>
  </head>
  <style>
    .linkedin:link {
      color: black;
      border: 1px solid;
      text-decoration: none;
    }
    .linkedin:visited {
      color: aquamarine;
      box-shadow: 1px 1px 3px;
    }
    .linkedin:active {
      color: red;
      border-radius: 7px;
    }
    .linkedin:hover {
      color: darkviolet;
      border-radius: 7px;
      box-shadow: 1px 1px 5px;
    }
  </style>
  <body>
    <a class="linkedin" href="https://linkedin.com" target="_blank">Linkedin</a>
    <!-- <a class="facebook" href="https://facebook.com" target="_blank">Facebook</a>
    <a class="youtube" href="https://youtube.com" target="_blank">Youtube</a>
    <a class="tiktok" href="https://tiktok.com" target="_blank">Tiktok</a> -->
  </body>
</html>
