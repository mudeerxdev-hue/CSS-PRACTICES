<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLASS-3-PRACTICE</title>
  </head>
  <style>
    h1 {
      color: pink;
    }
    div {
      color: red;
    }
    .parent {
      color: blue;
    }
    .child-1 {
      color: green;
    }
    .child-2 {
      color: yellow;
    }
    .child-3 {
      color: orange;
    }
    #child-3 {
      color: gray;
    }
  </style>
  <body>
    <h1>CSS RULES</h1>
    <div class="parent">
      <div class="child-1">khan</div>
      <div class="child-2">afridi</div>
      <div class="child-3" id="child-3">king</div>
      <p>my name</p>
    </div>
  </body>
</html>
