<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>class-9-practice</title>
  </head>
  <style>
    form {
      height: 34vh;
      width: 30%;
      border: 1px solid black;
      margin: 30vh auto;
      /* text-align: center; */
      box-shadow: 2px 2px 10px;
      padding: 10px;
      border-radius: 10px;
      padding: 5vh;
    }

    h1 {
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .group {
      margin-bottom: 20px;
    }

    .input {
      display: block;
      width: 100%;
      border-radius: 4px;
      box-sizing: border-box;
      border: 1px solid grey;
      padding: 8px;
    }

    .input:focus {
      outline: none;
    }

    #login {
      width: 100%;
      padding: 8px;
      border: 1px solid gray;
      border-radius: 4px;
      background-color: blue;
      color: white;
    }

    #login:hover {
      background-color: green;
      color: white;
    }
  </style>
  <body>
    <form action="">
      <h1>Login Form</h1>

      <div class="group">
        <label for="">Name:</label>
        <br />
        <input class="input" type="text" placeholder="Enter your name ..." />
      </div>

      <div class="group">
        <label for="">Email:</label>
        <br />
        <input class="input" type="email" placeholder="Enter your email ..." />
      </div>

      <div class="group">
        <input type="submit" value="Login the I'd" id="login" />
      </div>
    </form>
  </body>
</html>
